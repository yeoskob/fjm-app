<div class="app-shell">
  <header class="topbar" *ngIf="authService.isLoggedIn()">
    <div class="brand">FJM Portal</div>

    <nav class="menu">
      <a routerLink="/marketing" routerLinkActive="active" *ngIf="authService.hasMenu('marketing')">
        Marketing
      </a>
      <a routerLink="/sourcing" routerLinkActive="active" *ngIf="authService.hasMenu('sourcing')">
        Sourcing
      </a>
      <a routerLink="/dashboard" routerLinkActive="active" *ngIf="authService.hasMenu('dashboard')">
        Dashboard
      </a>
      <a routerLink="/pricelist" routerLinkActive="active" *ngIf="authService.hasMenu('pricelist')">
        Price Approval
      </a>
      <a routerLink="/admin/users" routerLinkActive="active" *ngIf="authService.hasMenu('admin')">
        Settings
      </a>
    </nav>

    <div class="user">
      <span>{{ authService.getCurrentUser()?.name }}</span>
      <button type="button" class="ghost" (click)="logout()">Logout</button>
    </div>
  </header>

  <ng-container *ngIf="authService.isLoggedIn() && (rfqNotif.visible$ | async) as notifs">
    <div class="rfq-notif-banner" *ngIf="notifs.length > 0">
      <span class="rfq-notif-icon">&#9888;</span>
      <span class="rfq-notif-text">
        <ng-container *ngIf="notifs.length === 1; else multiNotif">
          {{ notifs[0].message }}
        </ng-container>
        <ng-template #multiNotif>
          <strong>{{ notifs.length }}</strong> RFQs need your attention
        </ng-template>
      </span>
      <button type="button" class="rfq-notif-action" (click)="goToPricelist()">
        Review now &rarr;
      </button>
      <button type="button" class="rfq-notif-dismiss" (click)="rfqNotif.dismissAll()" title="Dismiss">&#10005;</button>
    </div>
  </ng-container>

  <main class="content" [class.full]="!authService.isLoggedIn()">
    <router-outlet></router-outlet>
  </main>
</div>
